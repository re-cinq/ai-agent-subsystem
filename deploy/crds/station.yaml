apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: stations.agents.re-cinq.com
spec:
  group: agents.re-cinq.com
  scope: Namespaced
  names:
    plural: stations
    singular: station
    kind: Station
    shortNames:
      - stn
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Recipe
          type: string
          jsonPath: .spec.agentDefRef
        - name: Deadline
          type: integer
          jsonPath: .spec.deadlineMinutes
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: The runtime template that pairs a recipe with a Pod template.
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - agentDefRef
                - template
              properties:
                agentDefRef:
                  type: string
                  description: Name of the AgentDefinition this Station runs.
                deadlineMinutes:
                  type: integer
                  default: 30
                  minimum: 1
                  description: Wall-clock limit per run; becomes the Job's activeDeadlineSeconds.
                successfulRunsHistoryLimit:
                  type: integer
                  default: 3
                  minimum: 0
                failedRunsHistoryLimit:
                  type: integer
                  default: 3
                  minimum: 0
                template:
                  type: object
                  description: Standard Kubernetes PodTemplateSpec. The container named "agent" is wired with the recipe and injected runtime.
                  x-kubernetes-preserve-unknown-fields: true
