apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-controller
  namespace: ai-agents
  labels:
    agents.re-cinq.com/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      agents.re-cinq.com/component: controller
  template:
    metadata:
      labels:
        agents.re-cinq.com/component: controller
    spec:
      serviceAccountName: agent-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: controller
          image: ghcr.io/re-cinq/ai-agent-controller:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              value: ai-agents
            - name: HEALTH_PORT
              value: "8081"
            # Image whose init container injects the agent runtime + supervisor
            # into each run pod. Override with ai-agent:dev for local clusters.
            - name: AGENT_IMAGE
              value: ghcr.io/re-cinq/ai-agent:latest
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
