apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-controller
  namespace: ai-agents
  labels:
    agents.re-cinq.com/component: controller
spec:
  # Two replicas for HA. Both run, but only the Lease holder reconciles (see
  # deploy/rbac/controller-rbac.yaml and the leader-election loop); a standby
  # takes over within the lease duration if the leader's pod dies.
  replicas: 2
  selector:
    matchLabels:
      agents.re-cinq.com/component: controller
  template:
    metadata:
      labels:
        agents.re-cinq.com/component: controller
      # Vanilla Prometheus pod discovery scrapes /metrics on the health port. With
      # the Prometheus Operator instead, drop these and point a ServiceMonitor at
      # the same port/path.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: agent-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: controller
          image: ghcr.io/re-cinq/ai-agent-controller:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              value: ai-agents
            # The replica's own pod name, used as its leader-election Lease
            # holder identity so the holder is identifiable in `kubectl get lease`.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HEALTH_PORT
              value: "8081"
            # Image whose init container injects the agent runtime + supervisor
            # into each run pod. Override with ai-agent:dev for local clusters.
            - name: AGENT_IMAGE
              value: ghcr.io/re-cinq/ai-agent@sha256:51f97c97f6ac646ac463a83d917eb2671e77b89e861643c924bd8150d2656f19
            # Bytes of run-pod log kept in status.output (the tail). Bounds the
            # Agent object under etcd's ~1.5 MB per-object limit. Default 256 KiB.
            - name: MAX_OUTPUT_BYTES
              value: "262144"
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
