apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-controller
  namespace: ai-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-controller
  namespace: ai-agents
rules:
  - apiGroups: ["agents.re-cinq.com"]
    resources: ["agents"]
    verbs: ["get", "list", "watch", "patch", "update", "delete"]
  - apiGroups: ["agents.re-cinq.com"]
    resources: ["agents/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["agents.re-cinq.com"]
    resources: ["stations", "agentdefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-controller
  namespace: ai-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-controller
subjects:
  - kind: ServiceAccount
    name: agent-controller
    namespace: ai-agents
