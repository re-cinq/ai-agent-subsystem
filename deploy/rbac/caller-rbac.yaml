# A narrow role for other in-cluster apps that only need to launch and inspect
# runs — no access to Jobs or pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-launcher
  namespace: ai-agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-launcher
  namespace: ai-agents
rules:
  - apiGroups: ["agents.re-cinq.com"]
    resources: ["agents"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-launcher
  namespace: ai-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-launcher
subjects:
  - kind: ServiceAccount
    name: agent-launcher
    namespace: ai-agents
