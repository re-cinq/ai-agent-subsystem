# One-command install: kubectl apply -k deploy
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - crds/agentdefinition.yaml
  - crds/station.yaml
  - crds/agent.yaml
  - rbac/controller-rbac.yaml
  - rbac/caller-rbac.yaml
  - rbac/networkpolicy.yaml
  - controller.yaml

# The controller image is pinned here. For reproducible, tamper-evident releases
# run scripts/pin-image-digests.sh, which rewrites `newTag` to an immutable
# `digest: sha256:...` (the digest cosign signs in .github/workflows/images.yml)
# and pins the AGENT_IMAGE the controller injects, in controller.yaml.
images:
  - name: ghcr.io/re-cinq/ai-agent-controller
    digest: sha256:878ca910d72a8532add05c6fdfdfb12f33c59253689127d0051ff64e243426d2
