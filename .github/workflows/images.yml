name: Publish images

# Build and push the controller and agent runtime images to GHCR. Runs after a
# merge to main (the CI + controller-container workflows gate the PR) and on
# version tags. The agent image is the AGENT_IMAGE the controller injects as each
# run pod's init container; the controller image backs deploy/controller.yaml.
#
# Supply chain: each pushed image is signed with cosign (keyless, via the GitHub
# OIDC token — no stored keys) and carries an SPDX SBOM + SLSA provenance
# attestation. The immutable digest is written to the run summary.
#
# Release pinning: on a v* tag the `pin` job takes the digests this build emitted
# and opens a PR that points deploy/ at them (scripts/pin-image-digests.sh), so a
# release never ships a floating :latest. See README "Releases".

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign signing via the GitHub OIDC token

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: ghcr.io/re-cinq/ai-agent-controller
            file: deploy/Dockerfile.controller
            key: controller
          - image: ghcr.io/re-cinq/ai-agent
            file: scripts/container/Dockerfile.agent
            key: agent
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true # SPDX SBOM attestation, attached to the image
          provenance: mode=max # SLSA build provenance attestation
      - uses: sigstore/cosign-installer@v3
      - name: Sign the image by digest (keyless)
        env:
          IMAGE: ${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
      - name: Record the immutable digest
        env:
          IMAGE: ${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "- \`${IMAGE}@${DIGEST}\`" >> "$GITHUB_STEP_SUMMARY"
      # Hand each leg's digest to the pin job. A matrix can't set distinct
      # job outputs (legs share one map, last writer wins), so go via artifacts.
      - name: Stage the digest for the pin job
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "${DIGEST}" > "${{ matrix.key }}.digest"
      - name: Upload the digest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.key }}
          path: ${{ matrix.key }}.digest
          retention-days: 1

  # On a v* tag, point deploy/ at the exact signed digests this run built and open
  # a PR. The digests come from the build outputs above, so no registry read is
  # needed. Requires the repo setting "Allow GitHub Actions to create and approve
  # pull requests" (Settings -> Actions -> General). The PR is opened with the
  # default token, so it deliberately carries a digest-only change for a human to
  # review and merge.
  pin:
    name: Pin deploy/ to released digests
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the pin branch
      pull-requests: write # open the pin PR
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main # pin onto the development branch, not the tagged commit
      - uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true
      - name: Pin deploy/ and open a PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          export CONTROLLER_DIGEST="$(cat digests/controller.digest)"
          export AGENT_DIGEST="$(cat digests/agent.digest)"
          ./scripts/pin-image-digests.sh "$TAG"
          if git diff --quiet -- deploy/; then
            echo "deploy/ already pinned to ${TAG}; nothing to do"
            exit 0
          fi
          branch="chore/pin-deploy-${TAG}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git commit -am "chore(deploy): pin deploy/ to ${TAG} image digests"
          git push -u origin "$branch" --force-with-lease
          gh pr create --base main --head "$branch" \
            --title "chore(deploy): pin deploy/ to ${TAG} image digests" \
            --body "Automated by the release pin job. deploy/ now references the cosign-signed digests built for \`${TAG}\` instead of a mutable tag, closing the floating-\`:latest\` gap for this release."
