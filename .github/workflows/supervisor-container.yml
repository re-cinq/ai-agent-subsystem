name: Supervisor container

# Cross-distro supervisor test, driven by scripts/ctest-supervisor.sh (the same
# script a dev runs locally): build the supervisor stack once and run its
# integration suite on the glibc distros used as Kubernetes base images, proving
# the supervisor (which links vibe-d / openssl) runs there: streaming, file/http
# sinks, signal forwarding, and exit-code passthrough against a real mock agent.
#
# The supervisor requires glibc (Alpine/musl is excluded by design). It is built
# on rockylinux:9 — the oldest glibc (2.34) and openssl 3 (libssl.so.3) common to
# every glibc distro in the matrix — so the one build runs on all of them; the ldc
# runtime libs ride along and libssl3 is installed per distro when missing.

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'dub.json'
      - 'scripts/container/run-itest.sh'
      - 'scripts/ctest-supervisor.sh'
      - '.github/workflows/supervisor-container.yml'
  pull_request:
    paths:
      - 'packages/**'
      - 'dub.json'
      - 'scripts/container/run-itest.sh'
      - 'scripts/ctest-supervisor.sh'
      - '.github/workflows/supervisor-container.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build supervisor stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build supervisor + mock + itest on Rocky 9
        run: BUILD_ONLY=1 STAGE_DIR=stage ./scripts/ctest-supervisor.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supervisor-stack
          path: stage
          if-no-files-found: error

  test:
    name: ${{ matrix.image }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - rockylinux:9
          - amazonlinux:2023
          - debian:bookworm-slim
          - ubuntu:24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: supervisor-stack
          path: stage
      - name: Run supervisor itest on ${{ matrix.image }}
        run: SKIP_BUILD=1 STAGE_DIR=stage TARGETS="${{ matrix.image }}" ./scripts/ctest-supervisor.sh
