name: Init container

# Cross-distro init-container test, driven by scripts/ctest-init-portable.sh (the
# same script a dev runs locally): build ai-agent-init once and exercise it on the
# top distros used as Kubernetes base images, proving the init container
# self-bootstraps its prerequisites (git via the distro package manager) and
# clones for real on each.
#
# The binary links druntime/phobos statically but glibc dynamically, so one build
# on an old-glibc base (debian:bullseye, glibc 2.31) runs on every glibc distro in
# the matrix. Alpine is musl, so it builds + tests natively in its own job.

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'dub.json'
      - 'scripts/container/**'
      - 'scripts/ctest-init-portable.sh'
      - '.github/workflows/init-container.yml'
  pull_request:
    paths:
      - 'packages/**'
      - 'dub.json'
      - 'scripts/container/**'
      - 'scripts/ctest-init-portable.sh'
      - '.github/workflows/init-container.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build portable ai-agent-init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build (static D runtime, dynamic glibc) on old glibc
        run: BUILD_ONLY=1 STAGE_DIR=stage ./scripts/ctest-init-portable.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-agent-init
          path: stage/ai-agent-init
          if-no-files-found: error

  test-glibc:
    name: ${{ matrix.image }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:bookworm-slim
          - ubuntu:24.04
          - rockylinux:9
          - amazonlinux:2023
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ai-agent-init
          path: stage
      - name: Run init container on ${{ matrix.image }}
        run: SKIP_BUILD=1 STAGE_DIR=stage TARGETS="${{ matrix.image }}" ./scripts/ctest-init-portable.sh

  test-musl:
    name: alpine:3.20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build + run init container on Alpine (native musl)
        run: TARGETS=alpine:3.20 ./scripts/ctest-init-portable.sh
