name: CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'deploy/crds/**'
      - 'dub.json'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dlang-community/setup-dlang@d7d85fcde7c4cd5f9a6618fce1bccc316e1e910b # v2
        with:
          compiler: dmd-2.111.0
      - name: Unit tests
        run: make test
      - name: Build binaries
        run: make build
      - name: Drift checks (generated CRDs + TS contracts)
        run: make drift
      - name: Host integration tests (supervisor + initializer)
        run: make itest

  agent-contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent-contracts
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Test (100% coverage gate)
        run: npm run test:coverage
      - name: Build
        run: npm run build

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Build with Astro (PR gate for docs)
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6
        with:
          path: ./website
          node-version: 22
