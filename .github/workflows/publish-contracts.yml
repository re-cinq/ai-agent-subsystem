name: Publish agent-contracts

# On a v* tag, build + test the @re-cinq/agent-contracts package and publish it to
# npm with provenance. The TS types are regenerated from the D model first and the
# drift check guards that the committed output matches the structs.
#
# Auth is tokenless via npm Trusted Publishing (OIDC): no NPM_TOKEN secret. It needs
# `id-token: write` (below), npm >= 11.5.1 (upgraded below), and a trusted publisher
# configured for @re-cinq/agent-contracts on npmjs.com pointing at this repo and the
# publish-contracts.yml workflow. The package's first-ever publish must be done once
# with a token before the trusted publisher can be registered on npmjs.com.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance via the GitHub OIDC token

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dlang-community/setup-dlang@d7d85fcde7c4cd5f9a6618fce1bccc316e1e910b # v2
        with:
          compiler: dmd-latest
      - name: Contracts drift check (types match the D model)
        run: ./scripts/check-contracts-drift.sh
      - uses: actions/setup-node@v4 # TODO: pin to a digest to match the repo's SHA-pinned actions
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@^11.5.1
      - name: Install, test (100% coverage gate), build
        working-directory: packages/agent-contracts
        run: |
          npm ci
          npm run test:coverage
          npm run build
      - name: Publish to npm
        working-directory: packages/agent-contracts
        run: npm publish --provenance --access public
